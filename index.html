<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Hệ Mặt Trời 3D - D.T.Chánh</title>
    <style>
        :root {
            --bg-color: #020617;
            --panel-bg: rgba(15, 23, 42, 0.85);
            --border-color: rgba(148, 163, 184, 0.2);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #container3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        #labels-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 5;
        }

        .planet-label {
            position: absolute;
            font-size: 1rem;
            font-weight: normal;
            font-style: normal;
            color: #cbd5e1;
            transform: translate(-50%, -100%);
            white-space: nowrap;
            pointer-events: none;
            display: none;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9); 
        }

        .planet-label.sun-label {
            color: #ff9d00;
            text-shadow: 0 2px 5px rgba(251, 146, 60, 0.4), 0 2px 4px rgba(0, 0, 0, 0.9);
        }

        .planet-label.moon-label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
        }

        .overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }

        #control-panel {
            top: 1.25rem;
            left: 1.25rem;
            width: 20rem;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.25rem;
            pointer-events: auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        #info-panel {
            top: 1.25rem;
            right: 1.25rem;
            width: 21.25rem;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.25rem;
            pointer-events: auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            transform: translateX(25rem);
            opacity: 0;
        }

        #info-panel.active {
            transform: translateX(0);
            opacity: 1;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
            color: #fff;
            text-align: center;
        }

        .author {
            font-style: normal;
            font-size: 1.2rem;
            text-align: right;
            color: #94a3b8;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .control-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.35rem;
            color: #94a3b8;
        }

        select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background-color: #1e293b;
            color: var(--text-color);
            border: 2px solid var(--border-color);
            border-radius: 0.375rem;
            cursor: pointer;
            outline: none;
            font-size: 0.9rem;
            font-family: inherit;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        input[type="range"] {
            flex: 1;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        button {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            width: 100%;
            margin-bottom: 0.5rem;
            font-family: inherit;
            font-size: 0.95rem;
        }

        button:hover {
            background-color: #0369a1;
        }

        button.secondary {
            background-color: #334155;
            border: 2px solid var(--border-color);
        }

        button.secondary:hover {
            background-color: #475569;
        }

        #planet-name {
            font-size: 1.4rem;
            color: var(--accent-color);
            margin-bottom: 0.625rem;
            font-weight: bold;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            border-bottom: 2px dotted rgba(255,255,255,0.2);
            padding-bottom: 0.25rem;
        }

        .info-label {
            color: #94a3b8;
        }

        #planet-desc {
            font-size: 0.88rem;
            line-height: 1.45;
            margin-top: 0.75rem;
            color: #cbd5e1;
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            width: 1.8rem;
            height: 1.8rem;
            margin-bottom: 0;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-btn svg {
            width: 1.5rem;
            height: 1.5rem;
            fill: currentColor;
        }

        .close-btn:hover {
            color: #ef4444;
            background: transparent;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #instructions {
            bottom: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.6);
            padding: 0.5rem 1rem;
            border-radius: 1.25rem;
            font-size: 0.8rem;
            pointer-events: none;
            color: #94a3b8;
            border: 2px solid var(--border-color);
            backdrop-filter: blur(4px);
            text-align: center;
            width: 90%;
            max-width: 40rem;
        }

        /* Tương thích giao diện điện thoại */
        @media (max-width: 48rem) {
            #control-panel {
                width: calc(100% - 2.5rem);
                max-height: 40vh;
                overflow-y: auto;
            }
            #info-panel {
                top: auto;
                bottom: 5rem;
                right: 1.25rem;
                width: calc(100% - 2.5rem);
                transform: translateY(120%);
            }
            #info-panel.active {
                transform: translateY(0);
            }
            #instructions {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div id="container3d"></div>
    <div id="labels-container"></div>

    <div id="control-panel" class="overlay">
        <h1>Hệ Mặt Trời 3D (Kepler)</h1>
        <div class="author">D.T.Chánh</div>
        
        <div class="control-group">
            <label for="planet-select">Chọn nhanh hành tinh</label>
            <select id="planet-select">
                <option value="">-- Chọn hành tinh --</option>
            </select>
            
            <button id="btn-track" class="secondary" style="margin-top: 0.625rem; display: none;">Theo dõi hành tinh này</button>
        </div>

        <div class="control-group">
            <button id="btn-pause">Tạm dừng</button>
            <button id="btn-reset" class="secondary">Khôi phục góc nhìn</button>
        </div>

        <div class="control-group">
            <label for="speed-slider">Tốc độ mô phỏng (<span id="speed-val">1,0</span>x)</label>
            <div class="slider-container">
                <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
            </div>
        </div>

        <div class="control-group" style="display: flex; gap: 0.625rem; align-items: center; margin-top: 0.625rem;">
            <input type="checkbox" id="chk-orbits" checked style="cursor: pointer; width: 1.25rem; height: 1.25rem;">
            <label for="chk-orbits" style="margin-bottom: 0; cursor: pointer;">Hiển thị đường quỹ đạo</label>
        </div>
    </div>

    <div id="info-panel" class="overlay">
        <h1 class="info-header" style="text-align: left; font-size: 1.25rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1rem;">
            <span>Thông tin chi tiết</span>
            <button class="close-btn" id="btn-close-info" aria-label="Đóng">
                <svg viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z" />
                </svg>
            </button>
        </h1>
        <div id="planet-name">Trái Đất</div>
        <div class="info-row">
            <span class="info-label">Khoảng cách trung bình:</span>
            <span id="info-distance">1 AU</span>
        </div>
        <div class="info-row">
            <span class="info-label">Chu kỳ quỹ đạo:</span>
            <span id="info-period">365 ngày</span>
        </div>
        <div class="info-row">
            <span class="info-label">Đường kính:</span>
            <span id="info-diameter">12.742 km</span>
        </div>
        <div id="planet-desc">Mô tả...</div>
    </div>

    <div id="instructions" class="overlay">
        Xoay 3D: Giữ chuột/chạm 1 ngón | Di chuyển: Chuột phải/chạm 2 ngón | Phóng to: Cuộn/Vuốt chụm
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const container = document.getElementById('container3d');
        const labelsContainer = document.getElementById('labels-container');
        const scene = new THREE.Scene();
        
        scene.fog = new THREE.FogExp2(0x020617, 0.001);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 800;
        controls.minDistance = 5;

        function updateCameraOffset() {
            if(window.innerWidth <= 768) {
                camera.clearViewOffset();
                return;
            }
            const panelWidth = 340; 
            const offsetX = -panelWidth / 2;
            
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.setViewOffset(window.innerWidth, window.innerHeight, offsetX, 0, window.innerWidth, window.innerHeight);
            camera.updateProjectionMatrix();
        }
        
        camera.position.set(0, 150, 280);
        updateCameraOffset();

        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 2, 800, 0.5);
        scene.add(sunLight);

        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const starPositions = new Float32Array(starsCount * 3);

        for(let i = 0; i < starsCount * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 1200;
            starPositions[i+1] = (Math.random() - 0.5) * 1200;
            starPositions[i+2] = (Math.random() - 0.5) * 1200;
        }

        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        let isRunning = true;
        let speedMultiplier = 1.0;
        let selectedPlanet = null;
        let isTracking = false;
        let showOrbits = true;
        const orbitLines = [];

        function createHtmlLabel(id, text, isSun = false, isMoon = false) {
            const div = document.createElement('div');
            div.id = `label-${id}`;
            div.className = `planet-label ${isSun ? 'sun-label' : ''} ${isMoon ? 'moon-label' : ''}`;
            div.innerText = text;
            labelsContainer.appendChild(div);
            return div;
        }

        function solveKepler(M, e) {
            let E = M; 
            const tolerance = 0.000001;
            for (let i = 0; i < 100; i++) {
                const deltaE = (M - (E - e * Math.sin(E))) / (1 - e * Math.cos(E));
                E += deltaE;
                if (Math.abs(deltaE) < tolerance) break;
            }
            return E;
        }

        const sunData = {
            id: "sun",
            name: "Mặt Trời (Sun)",
            displayName: "Mặt Trời",
            radius: 12,
            color: 0xff7700,
            physDistance: "0",
            diameter: "1.392.700 km",
            info: "Ngôi sao ở trung tâm Hệ Mặt Trời, chiếm khoảng 99.86% khối lượng của toàn hệ thống và tỏa nguồn năng lượng lớn nuôi dưỡng Trái Đất."
        };

        const planetsData = [
            {
                id: "mercury",
                name: "Sao Thuỷ (Mercury)",
                displayName: "Sao Thuỷ",
                color: 0x94a3b8,
                radius: 1.2,
                distance: 28,     
                eccentricity: 0.21, 
                speed: 0.03,        
                meanAnomaly: Math.random() * Math.PI * 2, 
                inclination: 0.05,
                period: "88 ngày",
                physDistance: "0,39 AU",
                diameter: "4.879 km",
                info: "Hành tinh nhỏ nhất và gần Mặt Trời nhất. Quỹ đạo lệch tâm lớn (hình elip dẹt) khiến khoảng cách của nó tới Mặt Trời thay đổi mạnh từ 46 triệu tới 70 triệu km."
            },
            {
                id: "venus",
                name: "Sao Kim (Venus)",
                displayName: "Sao Kim",
                color: "#eab308",
                radius: 2.2,
                distance: 42,
                eccentricity: 0.05, 
                speed: 0.015,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.03,
                period: "225 ngày",
                physDistance: "0,72 AU",
                diameter: "12.104 km",
                info: "Hành tinh nóng nhất Hệ Mặt Trời vì hiệu ứng nhà kính dày đặc giữ lại nhiệt lượng."
            },
            {
                id: "earth",
                name: "Trái Đất (Earth)",
                displayName: "Trái Đất",
                color: 0x2563eb,
                radius: 2.4,
                distance: 58,
                eccentricity: 0.09, 
                speed: 0.01,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0,
                period: "365 ngày",
                physDistance: "1,0 AU",
                diameter: "12.742 km",
                info: "Hành tinh duy nhất có sự sống và nước dạng lỏng dồi dào trên bề mặt. Trái Đất có vệ tinh tự nhiên nổi tiếng nhất là Mặt Trăng.",
                moons: [
                    { name: "Mặt Trăng", radius: 0.6, distance: 4.8, speed: 0.04, eccentricity: 0.05, color: 0xd1d5db }
                ]
            },
            {
                id: "mars",
                name: "Sao Hoả (Mars)",
                displayName: "Sao Hoả",
                color: 0xef4444,
                radius: 1.8,
                distance: 72,
                eccentricity: 0.18, 
                speed: 0.008,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.02,
                period: "687 ngày",
                physDistance: "1,52 AU",
                diameter: "6.779 km",
                info: "Hành tinh Đỏ giàu oxit sắt. Quỹ đạo hình elip dẹt rõ rệt khiến thời tiết và áp suất bầu khí quyển trên Sao Hoả biến đổi cực kỳ gay gắt giữa các mùa."
            },
            {
                id: "jupiter",
                name: "Sao Mộc (Jupiter)",
                displayName: "Sao Mộc",
                color: 0xf59e0b,
                radius: 5.2,
                distance: 96,
                eccentricity: 0.12,
                speed: 0.004,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.01,
                period: "12 năm",
                physDistance: "5,2 AU",
                diameter: "139.820 km",
                info: "Gã khổng lồ khí lớn nhất Thái Dương Hệ. Được bao quanh bởi 4 vệ tinh lớn tuyệt đẹp (Io, Europa, Ganymede và Callisto).",
                moons: [
                    { name: "Io", radius: 0.45, distance: 7.2, speed: 0.08, eccentricity: 0.01, color: 0xfef08a },
                    { name: "Europa", radius: 0.40, distance: 9.5, speed: 0.05, eccentricity: 0.01, color: 0x93c5fd },
                    { name: "Ganymede", radius: 0.55, distance: 12.2, speed: 0.035, eccentricity: 0.01, color: 0xe2e8f0 },
                    { name: "Callisto", radius: 0.50, distance: 15.5, speed: 0.02, eccentricity: 0.01, color: 0x94a3b8 }
                ]
            },
            {
                id: "saturn",
                name: "Sao Thổ (Saturn)",
                displayName: "Sao Thổ",
                color: 0xfde047,
                radius: 4.3,
                distance: 124,
                eccentricity: 0.15,
                speed: 0.002,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.04,
                period: "29 năm",
                physDistance: "9,58 AU",
                diameter: "116.460 km",
                hasRings: true,
                info: "Hành tinh khí có hệ vành đai tráng lệ. Sở hữu vệ tinh lớn thứ hai Hệ Mặt Trời là Titan với bầu khí quyển nitơ dày đặc đặc biệt.",
                moons: [
                    { name: "Titan", radius: 0.55, distance: 13.0, speed: 0.025, eccentricity: 0.03, color: 0xfbbf24 } 
                ]
            },
            {
                id: "uranus",
                name: "Sao Thiên Vương (Uranus)",
                displayName: "Sao Thiên Vương",
                color: 0x22d3ee,
                radius: 3.2,
                distance: 150,
                eccentricity: 0.10,
                speed: 0.0009,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.01,
                period: "84 năm",
                physDistance: "19,2 AU",
                diameter: "50.724 km",
                info: "Người khổng lồ băng xoay ngang dị thường so với quỹ đạo chung của cả hệ."
            },
            {
                id: "neptune",
                name: "Sao Hải Vương (Neptune)",
                displayName: "Sao Hải Vương",
                color: 0x1d4ed8,
                radius: 3.1,
                distance: 176,
                eccentricity: 0.07,
                speed: 0.0005,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.02,
                period: "165 năm",
                physDistance: "30,1 AU",
                diameter: "49.244 km",
                info: "Hành tinh xa nhất Hệ Mặt Trời. Sở hữu vệ tinh Triton lớn chạy theo quỹ đạo nghịch hành cực kỳ dị thường.",
                moons: [
                    { name: "Triton", radius: 0.45, distance: 5.8, speed: -0.04, eccentricity: 0.01, color: 0xa5f3fc } 
                ]
            }
        ];

        const sunGeometry = new THREE.SphereGeometry(sunData.radius, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: sunData.color });
        const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sunMesh);
        sunData.mesh = sunMesh;

        const glowGeo = new THREE.SphereGeometry(sunData.radius * 1.25, 32, 32);
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0xffaa00,
            transparent: true,
            opacity: 0.15,
            side: THREE.BackSide
        });
        const glowMesh = new THREE.Mesh(glowGeo, glowMat);
        scene.add(glowMesh);

        sunData.labelEl = createHtmlLabel(sunData.id, sunData.displayName, true);

        planetsData.forEach(planet => {
            const orbitGroup = new THREE.Group();
            orbitGroup.rotation.z = planet.inclination;
            scene.add(orbitGroup);

            const b = planet.distance * Math.sqrt(1 - planet.eccentricity ** 2);
            const c = planet.distance * planet.eccentricity;

            const orbitPath = new THREE.BufferGeometry();
            const points = [];
            for (let i = 0; i <= 100; i++) {
                const theta = (i / 100) * Math.PI * 2;
                points.push(new THREE.Vector3(planet.distance * Math.cos(theta) - c, 0, b * Math.sin(theta)));
            }
            orbitPath.setFromPoints(points);
            const orbitMaterial = new THREE.LineBasicMaterial({ color: 0x475569, opacity: 0.35, transparent: true });
            const orbitLine = new THREE.Line(orbitPath, orbitMaterial);
            orbitGroup.add(orbitLine);
            orbitLines.push(orbitLine);

            const planetGeometry = new THREE.SphereGeometry(planet.radius, 32, 32);
            const planetMaterial = new THREE.MeshStandardMaterial({
                color: planet.color,
                roughness: 0.6,
                metalness: 0.1
            });
            const planetMesh = new THREE.Mesh(planetGeometry, planetMaterial);
            planetMesh.castShadow = true;
            planetMesh.receiveShadow = true;
            orbitGroup.add(planetMesh);

            planet.mesh = planetMesh;
            planet.orbitGroup = orbitGroup;
            planet.semiMinorAxis = b;
            planet.focusShift = c;

            planet.labelEl = createHtmlLabel(planet.id, planet.displayName, false);

            if (planet.hasRings) {
                const ringGeometry = new THREE.RingGeometry(planet.radius * 1.3, planet.radius * 2.3, 30);
                const ringMaterial = new THREE.MeshStandardMaterial({
                    color: 0xddc48f,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.8
                });
                const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
                ringMesh.rotation.x = Math.PI / 2;
                planetMesh.add(ringMesh);
            }

            if (planet.moons) {
                planet.moonObjects = [];
                planet.moons.forEach(moonData => {
                    const moonSubGroup = new THREE.Group();
                    orbitGroup.add(moonSubGroup); 

                    const moonOrbitPath = new THREE.BufferGeometry();
                    const mPoints = [];
                    const bMoon = moonData.distance * Math.sqrt(1 - moonData.eccentricity ** 2);
                    const cMoon = moonData.distance * moonData.eccentricity;
                    for (let j = 0; j <= 50; j++) {
                        const theta = (j / 50) * Math.PI * 2;
                        mPoints.push(new THREE.Vector3(moonData.distance * Math.cos(theta) - cMoon, 0, bMoon * Math.sin(theta)));
                    }
                    moonOrbitPath.setFromPoints(mPoints);
                    const moonOrbitMat = new THREE.LineBasicMaterial({ color: 0x475569, opacity: 0.12, transparent: true });
                    const moonOrbitLine = new THREE.Line(moonOrbitPath, moonOrbitMat);
                    moonSubGroup.add(moonOrbitLine);
                    orbitLines.push(moonOrbitLine);

                    const moonGeo = new THREE.SphereGeometry(moonData.radius, 16, 16);
                    const moonMat = new THREE.MeshStandardMaterial({ color: moonData.color || 0xd1d5db, roughness: 0.9 });
                    const moonMesh = new THREE.Mesh(moonGeo, moonMat);
                    moonSubGroup.add(moonMesh);

                    const moonLabel = createHtmlLabel(planet.id + "_" + moonData.name, moonData.name, false, true);

                    planet.moonObjects.push({
                        subGroup: moonSubGroup,
                        mesh: moonMesh,
                        data: moonData,
                        angle: Math.random() * Math.PI * 2,
                        semiMinorAxis: bMoon,
                        focusShift: cMoon,
                        labelEl: moonLabel
                    });
                });
            }
        });

        const planetSelect = document.getElementById('planet-select');
        
        const sunOption = document.createElement('option');
        sunOption.value = "sun";
        sunOption.text = sunData.name;
        planetSelect.appendChild(sunOption);

        planetsData.forEach(planet => {
            const option = document.createElement('option');
            option.value = planet.id;
            option.text = planet.name;
            planetSelect.appendChild(option);
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Biến lưu tọa độ lúc nhấn chuột
        let pointerDownX = 0;
        let pointerDownY = 0;

        window.addEventListener('pointerdown', (e) => {
            pointerDownX = e.clientX;
            pointerDownY = e.clientY;
        });

        window.addEventListener('pointerup', (e) => {
            const diffX = Math.abs(e.clientX - pointerDownX);
            const diffY = Math.abs(e.clientY - pointerDownY);

            // NẾU chuột đã di chuyển > 5px, chứng tỏ là đang Drag (kéo xoay màn hình), 
            // bỏ qua việc check click chọn/hủy hành tinh.
            if (diffX > 5 || diffY > 5) {
                return;
            }

            if (e.target.closest('#control-panel') || e.target.closest('#info-panel') || e.target.closest('#instructions')) {
                return;
            }

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const targets = [sunMesh];
            planetsData.forEach(p => targets.push(p.mesh));

            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                
                if (clickedMesh === sunMesh) {
                    showInfo(sunData);
                } else {
                    const matchedPlanet = planetsData.find(p => p.mesh === clickedMesh);
                    if (matchedPlanet) showInfo(matchedPlanet);
                }
            } else {
                isTracking = false;
                selectedPlanet = null;
                planetSelect.value = "";
                document.getElementById('btn-track').style.display = "none";
                document.getElementById('info-panel').classList.remove('active');
            }
        });

        function showInfo(obj) {
            selectedPlanet = obj;
            document.getElementById('planet-name').innerText = obj.name;
            document.getElementById('planet-desc').innerText = obj.info;

            const distRow = document.getElementById('info-distance').parentNode;
            const periodRow = document.getElementById('info-period').parentNode;
            const diaRow = document.getElementById('info-diameter').parentNode;
            const btnTrack = document.getElementById('btn-track');

            if (obj.id === "sun") {
                distRow.style.display = "none";
                periodRow.style.display = "none";
                diaRow.style.display = "flex";
                document.getElementById('info-diameter').innerText = obj.diameter;
                btnTrack.style.display = "none";
                isTracking = false;
                planetSelect.value = "sun";
            } else {
                distRow.style.display = "flex";
                periodRow.style.display = "flex";
                diaRow.style.display = "flex";
                document.getElementById('info-distance').innerText = obj.physDistance;
                document.getElementById('info-period').innerText = obj.period;
                document.getElementById('info-diameter').innerText = obj.diameter;
                
                btnTrack.style.display = "block";
                btnTrack.innerText = isTracking ? "Dừng theo dõi" : "Theo dõi hành tinh này";
                planetSelect.value = obj.id;
            }

            document.getElementById('info-panel').classList.add('active');
        }

        function closeInfoPanel() {
            document.getElementById('info-panel').classList.remove('active');
        }

        planetSelect.addEventListener('change', (e) => {
            const selectedId = e.target.value;
            if (selectedId === "") {
                closeInfoPanel();
                isTracking = false;
                selectedPlanet = null;
                document.getElementById('btn-track').style.display = "none";
            } else if (selectedId === "sun") {
                showInfo(sunData);
                controls.target.set(0, 0, 0);
                isTracking = false;
                document.getElementById('btn-track').style.display = "none";
            } else {
                const planet = planetsData.find(p => p.id === selectedId);
                if (planet) {
                    isTracking = true;
                    showInfo(planet);
                }
            }
        });

        const btnPause = document.getElementById('btn-pause');
        btnPause.addEventListener('click', () => {
            isRunning = !isRunning;
            btnPause.innerText = isRunning ? "Tạm dừng" : "Tiếp tục";
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            closeInfoPanel();
            camera.position.set(0, 150, 280);
            updateCameraOffset();
            controls.target.set(0, 0, 0);
            isTracking = false;
            selectedPlanet = null;
            planetSelect.value = "";
            document.getElementById('btn-track').style.display = "none";
        });

        const speedSlider = document.getElementById('speed-slider');
        const speedVal = document.getElementById('speed-val');
        speedSlider.addEventListener('input', () => {
            speedMultiplier = parseFloat(speedSlider.value);
            speedVal.innerText = speedMultiplier.toFixed(1).replace(".", ",");
        });

        document.getElementById('chk-orbits').addEventListener('change', (e) => {
            showOrbits = e.target.checked;
            orbitLines.forEach(line => line.visible = showOrbits);
        });

        document.getElementById('btn-track').addEventListener('click', () => {
            if (selectedPlanet && selectedPlanet.id !== "sun") {
                isTracking = !isTracking;
                document.getElementById('btn-track').innerText = isTracking ? "Dừng theo dõi" : "Theo dõi hành tinh này";
            }
        });

        document.getElementById('btn-close-info').addEventListener('click', closeInfoPanel);

        const tempV = new THREE.Vector3();

        function updateLabelPosition(mesh, labelEl, offsetHeight) {
            tempV.setFromMatrixPosition(mesh.matrixWorld);
            tempV.y += offsetHeight; 
            
            tempV.project(camera);

            if (tempV.z > 1) {
                labelEl.style.display = 'none'; 
            } else {
                labelEl.style.display = 'block'; 
                const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;
                
                labelEl.style.left = `${x}px`;
                labelEl.style.top = `${y}px`;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            updateLabelPosition(sunMesh, sunData.labelEl, sunData.radius + 2.0);

            planetsData.forEach(planet => {
                if (isRunning) {
                    planet.meanAnomaly += planet.speed * speedMultiplier * 0.5;
                    planet.mesh.rotation.y += 0.01;
                }
                
                const E = solveKepler(planet.meanAnomaly, planet.eccentricity);
                const xLocal = planet.distance * Math.cos(E);
                const zLocal = planet.semiMinorAxis * Math.sin(E);

                planet.mesh.position.x = xLocal - planet.focusShift;
                planet.mesh.position.z = zLocal;

                updateLabelPosition(planet.mesh, planet.labelEl, planet.radius + 1.8);

                if (planet.moonObjects) {
                    planet.moonObjects.forEach(mObj => {
                        mObj.subGroup.position.copy(planet.mesh.position);
                        
                        if (isRunning) {
                            mObj.angle += mObj.data.speed * speedMultiplier * 0.5;
                            mObj.mesh.rotation.y += 0.005;
                        }

                        const Em = solveKepler(mObj.angle, mObj.data.eccentricity);
                        const xmLocal = mObj.data.distance * Math.cos(Em);
                        const zmLocal = mObj.semiMinorAxis * Math.sin(Em);

                        mObj.mesh.position.x = xmLocal - mObj.focusShift;
                        mObj.mesh.position.z = zmLocal;

                        if (selectedPlanet === planet) {
                            updateLabelPosition(mObj.mesh, mObj.labelEl, mObj.data.radius + 0.8);
                        } else {
                            mObj.labelEl.style.display = 'none'; 
                        }
                    });
                }
            });

            if (isRunning) sunMesh.rotation.y += 0.002;

            if (isTracking && selectedPlanet && selectedPlanet.id !== "sun") {
                const targetPosition = new THREE.Vector3();
                selectedPlanet.mesh.getWorldPosition(targetPosition);
                controls.target.copy(targetPosition);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            updateCameraOffset();
        });

        animate();
    </script>
</body>
</html>
