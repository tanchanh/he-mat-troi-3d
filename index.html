<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Hệ Mặt Trời 3D - D.T.Chánh</title>
    <style>
        :root {
            --bg-color: #020617;
            --panel-bg: rgba(15, 23, 42, 0.85);
            --border-color: rgba(148, 163, 184, 0.2);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #container3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Khung chứa các nhãn tên HTML phủ lên trên Canvas */
        #labels-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 5;
        }

        /* Định dạng nhãn tên hành tinh: Cỡ 1rem, chữ normal, không nền */
        .planet-label {
            position: absolute;
            font-size: 1rem;
            font-weight: normal;
            font-style: normal;
            color: #cbd5e1;
            transform: translate(-50%, -100%);
            white-space: nowrap;
            pointer-events: none;
            display: none;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9); 
        }

        .planet-label.sun-label {
            color: #ff9d00;
            text-shadow: 0 2px 5px rgba(251, 146, 60, 0.4), 0 2px 4px rgba(0, 0, 0, 0.9);
        }

        /* Giao diện Overlay điều khiển */
        .overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }

        /* Panel điều khiển bên trái */
        #control-panel {
            top: 20px;
            left: 20px;
            width: 320px;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            pointer-events: auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        /* Panel thông tin bên phải */
        #info-panel {
            top: 20px;
            right: 20px;
            width: 340px;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            pointer-events: auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            transform: translateX(380px);
            opacity: 0;
        }

        #info-panel.active {
            transform: translateX(0);
            opacity: 1;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #fff;
            text-align: center;
        }

        /* Tên tác giả dưới tiêu đề h1 */
        .author {
            font-style: normal;
            font-size: 1.2rem;
            text-align: right;
            color: #94a3b8;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
        }

        h2 {
            font-size: 1.3rem;
            font-weight: bold;
        }

        h3 {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #94a3b8;
        }

        select {
            width: 100%;
            padding: 8px 12px;
            background-color: #1e293b;
            color: var(--text-color);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            outline: none;
            font-size: 0.9rem;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        button {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            width: 100%;
            margin-bottom: 8px;
        }

        button:hover {
            background-color: #0369a1;
        }

        button.secondary {
            background-color: #334155;
            border: 2px solid var(--border-color);
        }

        button.secondary:hover {
            background-color: #475569;
        }

        #planet-name {
            font-size: 1.4rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            border-bottom: 1px dotted rgba(255,255,255,0.1);
            padding-bottom: 4px;
        }

        .info-label {
            color: #94a3b8;
        }

        #planet-desc {
            font-size: 0.88rem;
            line-height: 1.45;
            margin-top: 12px;
            color: #cbd5e1;
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.2rem;
            width: auto;
            margin-bottom: 0;
            padding: 0 5px;
        }
        .close-btn:hover {
            color: #fff;
        }

        #instructions {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            pointer-events: none;
            color: #94a3b8;
            border: 2px solid var(--border-color);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div id="container3d"></div>
    
    <!-- Vùng phủ chứa các nhãn HTML -->
    <div id="labels-container"></div>

    <!-- Panel Điều khiển -->
    <div id="control-panel" class="overlay">
        <h1>Hệ Mặt Trời 3D (Kepler)</h1>
        <div class="author">D.T.Chánh</div>
        
        <div class="control-group">
            <label for="planet-select">Chọn nhanh hành tinh</label>
            <select id="planet-select">
                <option value="">-- Chọn hành tinh --</option>
            </select>
        </div>

        <div class="control-group">
            <button id="btn-pause">Tạm dừng</button>
            <button id="btn-reset" class="secondary">Khôi phục góc nhìn</button>
        </div>

        <div class="control-group">
            <label for="speed-slider">Tốc độ mô phỏng (<span id="speed-val">1.0</span>x)</label>
            <div class="slider-container">
                <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
            </div>
        </div>

        <div class="control-group" style="display: flex; gap: 10px; align-items: center; margin-top: 10px;">
            <input type="checkbox" id="chk-orbits" checked style="cursor: pointer;">
            <label for="chk-orbits" style="margin-bottom: 0; cursor: pointer;">Hiển thị đường quỹ đạo</label>
        </div>
    </div>

    <!-- Panel Thông tin hành tinh -->
    <div id="info-panel" class="overlay">
        <h1 style="text-align: left; font-size: 1.25rem; border-bottom: 2px solid var(--border-color); padding-bottom: 8px; margin-bottom: 15px;">
            <span>Thông tin chi tiết</span>
            <button class="close-btn" id="btn-close-info">&times;</button>
        </h1>
        <div id="planet-name">Trái Đất</div>
        <div class="info-row">
            <span class="info-label">Khoảng cách trung bình:</span>
            <span id="info-distance">1 AU</span>
        </div>
        <div class="info-row">
            <span class="info-label">Chu kỳ quỹ đạo:</span>
            <span id="info-period">365 ngày</span>
        </div>
        <div class="info-row">
            <span class="info-label">Đường kính:</span>
            <span id="info-diameter">12,742 km</span>
        </div>
        <div id="planet-desc">Mô tả...</div>
        <button id="btn-track" class="secondary" style="margin-top: 15px;">Theo dõi hành tinh này</button>
    </div>

    <div id="instructions" class="overlay">
        Giữ chuột trái để Xoay 3D | Chuột phải để Di chuyển | Cuộn chuột để Phóng to/Thu nhỏ | Nhấp vào hành tinh để chọn
    </div>

    <!-- Nhúng thư viện Three.js và OrbitControls điều hướng -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const container = document.getElementById('container3d');
        const labelsContainer = document.getElementById('labels-container');
        const scene = new THREE.Scene();
        
        scene.fog = new THREE.FogExp2(0x020617, 0.001);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 150, 280);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 800;
        controls.minDistance = 15;

        // --- HỆ THỐNG ÁNH SÁNG ---
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 2, 800, 0.5);
        scene.add(sunLight);

        // --- TẠO KHÔNG GIAN SAO NỀN ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const starPositions = new Float32Array(starsCount * 3);

        for(let i = 0; i < starsCount * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 1200;
            starPositions[i+1] = (Math.random() - 0.5) * 1200;
            starPositions[i+2] = (Math.random() - 0.5) * 1200;
        }

        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // Biến điều khiển
        let isRunning = true;
        let speedMultiplier = 1.0;
        let selectedPlanet = null;
        let isTracking = false;
        let showOrbits = true;
        const orbitLines = [];

        // --- HÀM TẠO NHÃN HTML THỰC TẾ ---
        function createHtmlLabel(id, text, isSun = false) {
            const div = document.createElement('div');
            div.id = `label-${id}`;
            div.className = `planet-label ${isSun ? 'sun-label' : ''}`;
            div.innerText = text;
            labelsContainer.appendChild(div);
            return div;
        }

        // --- THUẬT TOÁN GIẢI PHƯƠNG TRÌNH KEPLER SỐ TRÌ (Newton-Raphson) ---
        function solveKepler(M, e) {
            let E = M; 
            const tolerance = 0.000001;
            for (let i = 0; i < 100; i++) {
                const deltaE = (M - (E - e * Math.sin(E))) / (1 - e * Math.cos(E));
                E += deltaE;
                if (Math.abs(deltaE) < tolerance) break;
            }
            return E;
        }

        // --- KHAI BÁO DỮ LIỆU HỆ MẶT TRỜI ---
        const sunData = {
            id: "sun",
            name: "Mặt Trời (Sun)",
            displayName: "Mặt Trời",
            radius: 12,
            color: 0xff7700,
            info: "Ngôi sao ở trung tâm Hệ Mặt Trời, chiếm khoảng 99.86% khối lượng của toàn hệ thống và tỏa nguồn năng lượng lớn nuôi dưỡng Trái Đất."
        };

        const planetsData = [
            {
                id: "mercury",
                name: "Sao Thuỷ (Mercury)",
                displayName: "Sao Thuỷ",
                color: 0x94a3b8,
                radius: 1.2,
                distance: 28,     
                eccentricity: 0.21, 
                speed: 0.03,        
                meanAnomaly: Math.random() * Math.PI * 2, 
                inclination: 0.05,
                period: "88 ngày",
                physDistance: "0.39 AU",
                diameter: "4,879 km",
                info: "Hành tinh nhỏ nhất và gần Mặt Trời nhất. Quỹ đạo lệch tâm lớn (hình elip dẹt) khiến khoảng cách của nó tới Mặt Trời thay đổi mạnh từ 46 triệu tới 70 triệu km."
            },
            {
                id: "venus",
                name: "Sao Kim (Venus)",
                displayName: "Sao Kim",
                color: "#eab308",
                radius: 2.2,
                distance: 42,
                eccentricity: 0.05, 
                speed: 0.015,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.03,
                period: "225 ngày",
                physDistance: "0.72 AU",
                diameter: "12,104 km",
                info: "Hành tinh nóng nhất Hệ Mặt Trời vì hiệu ứng nhà kính dày đặc giữ lại nhiệt lượng."
            },
            {
                id: "earth",
                name: "Trái Đất (Earth)",
                displayName: "Trái Đất",
                color: 0x2563eb,
                radius: 2.4,
                distance: 58,
                eccentricity: 0.09, 
                speed: 0.01,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0,
                period: "365 ngày",
                physDistance: "1.0 AU",
                diameter: "12,742 km",
                info: "Hành tinh duy nhất có sự sống và nước dạng lỏng dồi dào trên bề mặt. Quỹ đạo elip nhẹ khiến khoảng cách tới Mặt Trời dao động khoảng 5 triệu km trong năm."
            },
            {
                id: "mars",
                name: "Sao Hoả (Mars)",
                displayName: "Sao Hoả",
                color: 0xef4444,
                radius: 1.8,
                distance: 72,
                eccentricity: 0.18, 
                speed: 0.008,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.02,
                period: "687 ngày",
                physDistance: "1.52 AU",
                diameter: "6,779 km",
                info: "Hành tinh Đỏ giàu oxit sắt. Quỹ đạo hình elip dẹt rõ rệt khiến thời tiết và áp suất bầu khí quyển trên Sao Hoả biến đổi cực kỳ gay gắt giữa các mùa."
            },
            {
                id: "jupiter",
                name: "Sao Mộc (Jupiter)",
                displayName: "Sao Mộc",
                color: 0xf59e0b,
                radius: 5.2,
                distance: 96,
                eccentricity: 0.12,
                speed: 0.004,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.01,
                period: "12 năm",
                physDistance: "5.2 AU",
                diameter: "139,820 km",
                info: "Gã khổng lồ khí lớn nhất Thái Dương Hệ sở hữu lực hấp dẫn mạnh mẽ có tầm ảnh hưởng lớn đến quỹ đạo của các tiểu hành tinh xung quanh."
            },
            {
                id: "saturn",
                name: "Sao Thổ (Saturn)",
                displayName: "Sao Thổ",
                color: 0xfde047,
                radius: 4.3,
                distance: 124,
                eccentricity: 0.15,
                speed: 0.002,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.04,
                period: "29 năm",
                physDistance: "9.58 AU",
                diameter: "116,460 km",
                hasRings: true,
                info: "Hành tinh nổi tiếng nhờ hệ vành đai băng lộng lẫy và tuyệt đẹp quanh xích đạo."
            },
            {
                id: "uranus",
                name: "Sao Thiên Vương (Uranus)",
                displayName: "Sao Thiên Vương",
                color: 0x22d3ee,
                radius: 3.2,
                distance: 150,
                eccentricity: 0.10,
                speed: 0.0009,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.01,
                period: "84 năm",
                physDistance: "19.2 AU",
                diameter: "50,724 km",
                info: "Người khổng lồ băng xoay ngang dị thường so với quỹ đạo chung của cả hệ."
            },
            {
                id: "neptune",
                name: "Sao Hải Vương (Neptune)",
                displayName: "Sao Hải Vương",
                color: 0x1d4ed8,
                radius: 3.1,
                distance: 176,
                eccentricity: 0.07,
                speed: 0.0005,
                meanAnomaly: Math.random() * Math.PI * 2,
                inclination: 0.02,
                period: "165 năm",
                physDistance: "30.1 AU",
                diameter: "49,244 km",
                info: "Hành tinh xa nhất có những siêu bão cuồng phong với vận tốc gió khủng khiếp nhất."
            }
        ];

        // --- KHỞI TẠO ĐỐI TƯỢNG 3D ---

        // 1. Khởi tạo Mặt Trời
        const sunGeometry = new THREE.SphereGeometry(sunData.radius, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: sunData.color });
        const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sunMesh);
        sunData.mesh = sunMesh;

        // Hào quang Mặt Trời
        const glowGeo = new THREE.SphereGeometry(sunData.radius * 1.25, 32, 32);
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0xffaa00,
            transparent: true,
            opacity: 0.15,
            side: THREE.BackSide
        });
        const glowMesh = new THREE.Mesh(glowGeo, glowMat);
        scene.add(glowMesh);

        // Tạo nhãn tên HTML cho Mặt Trời
        sunData.labelEl = createHtmlLabel(sunData.id, sunData.displayName, true);

        // 2. Khởi tạo các Hành tinh hình Elip Kepler
        planetsData.forEach(planet => {
            const orbitGroup = new THREE.Group();
            orbitGroup.rotation.z = planet.inclination;
            scene.add(orbitGroup);

            // Bán trục nhỏ (b) của elip: b = a * sqrt(1 - e^2)
            const b = planet.distance * Math.sqrt(1 - planet.eccentricity ** 2);
            // Khoảng cách dịch tâm (c): c = a * e
            const c = planet.distance * planet.eccentricity;

            // Vẽ quỹ đạo elip lệch tâm
            const orbitPath = new THREE.BufferGeometry();
            const points = [];
            for (let i = 0; i <= 100; i++) {
                const theta = (i / 100) * Math.PI * 2;
                points.push(new THREE.Vector3(planet.distance * Math.cos(theta) - c, 0, b * Math.sin(theta)));
            }
            orbitPath.setFromPoints(points);
            const orbitMaterial = new THREE.LineBasicMaterial({ color: 0x475569, opacity: 0.35, transparent: true });
            const orbitLine = new THREE.Line(orbitPath, orbitMaterial);
            orbitGroup.add(orbitLine);
            orbitLines.push(orbitLine);

            // Tạo mô hình hành tinh
            const planetGeometry = new THREE.SphereGeometry(planet.radius, 32, 32);
            const planetMaterial = new THREE.MeshStandardMaterial({
                color: planet.color,
                roughness: 0.6,
                metalness: 0.1
            });
            const planetMesh = new THREE.Mesh(planetGeometry, planetMaterial);
            planetMesh.castShadow = true;
            planetMesh.receiveShadow = true;
            orbitGroup.add(planetMesh);

            planet.mesh = planetMesh;
            planet.orbitGroup = orbitGroup;
            planet.semiMinorAxis = b;
            planet.focusShift = c;

            // Tạo nhãn tên HTML cho hành tinh
            planet.labelEl = createHtmlLabel(planet.id, planet.displayName, false);

            // Vành đai Sao Thổ
            if (planet.hasRings) {
                const ringGeometry = new THREE.RingGeometry(planet.radius * 1.4, planet.radius * 2.3, 30);
                const ringMaterial = new THREE.MeshStandardMaterial({
                    color: 0xddc48f,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.8
                });
                const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
                ringMesh.rotation.x = Math.PI / 2;
                planetMesh.add(ringMesh);
            }

            // Tích hợp vệ tinh Mặt Trăng
            if (planet.id === "earth") {
                const moonGroup = new THREE.Group();
                orbitGroup.add(moonGroup);

                // Quỹ đạo mờ của Mặt Trăng quanh Trái Đất
                const moonOrbitPath = new THREE.BufferGeometry();
                const mPoints = [];
                const moonDist = 5.5;
                for (let j = 0; j <= 50; j++) {
                    const theta = (j / 50) * Math.PI * 2;
                    mPoints.push(new THREE.Vector3(Math.cos(theta) * moonDist, 0, Math.sin(theta) * moonDist));
                }
                moonOrbitPath.setFromPoints(mPoints);
                const moonOrbitMat = new THREE.LineBasicMaterial({ color: 0x94a3b8, opacity: 0.15, transparent: true });
                const moonOrbitLine = new THREE.Line(moonOrbitPath, moonOrbitMat);
                moonGroup.add(moonOrbitLine);
                orbitLines.push(moonOrbitLine);

                // Mô hình Mặt Trăng
                const moonGeo = new THREE.SphereGeometry(0.6, 16, 16);
                const moonMat = new THREE.MeshStandardMaterial({ color: 0xd1d5db, roughness: 0.9 });
                const moonMesh = new THREE.Mesh(moonGeo, moonMat);
                moonGroup.add(moonMesh);

                planet.moon = {
                    group: moonGroup,
                    mesh: moonMesh,
                    distance: moonDist,
                    speed: 0.05,
                    angle: 0
                };
            }
        });

        // Điền danh sách chọn nhanh
        const planetSelect = document.getElementById('planet-select');
        
        const sunOption = document.createElement('option');
        sunOption.value = "sun";
        sunOption.text = sunData.name;
        planetSelect.appendChild(sunOption);

        planetsData.forEach(planet => {
            const option = document.createElement('option');
            option.value = planet.id;
            option.text = planet.name;
            planetSelect.appendChild(option);
        });

        // --- XỬ LÝ RAYCASTER ĐỂ CLICK CHUỘT CHỌN HÀNH TINH ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (e) => {
            if (e.target.closest('#control-panel') || e.target.closest('#info-panel') || e.target.closest('#instructions')) {
                return;
            }

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const targets = [sunMesh];
            planetsData.forEach(p => targets.push(p.mesh));

            const intersects = raycaster.intersectObjects(targets);

            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                
                if (clickedMesh === sunMesh) {
                    showInfo(sunData);
                } else {
                    const matchedPlanet = planetsData.find(p => p.mesh === clickedMesh);
                    if (matchedPlanet) showInfo(matchedPlanet);
                }
            }
        });

        // --- CÁC HÀM ĐIỀU KHIỂN & CẬP NHẬT GIAO DIỆN ---

        function showInfo(obj) {
            selectedPlanet = obj;
            document.getElementById('planet-name').innerText = obj.name;
            document.getElementById('planet-desc').innerText = obj.info;

            const distRow = document.getElementById('info-distance').parentNode;
            const periodRow = document.getElementById('info-period').parentNode;
            const diaRow = document.getElementById('info-diameter').parentNode;
            const btnTrack = document.getElementById('btn-track');

            if (obj.id === "sun") {
                distRow.style.display = "none";
                periodRow.style.display = "none";
                diaRow.style.display = "flex";
                document.getElementById('info-diameter').innerText = "1,392,700 km";
                btnTrack.style.display = "none";
                isTracking = false;
                planetSelect.value = "sun";
            } else {
                distRow.style.display = "flex";
                periodRow.style.display = "flex";
                diaRow.style.display = "flex";
                document.getElementById('info-distance').innerText = obj.physDistance;
                document.getElementById('info-period').innerText = obj.period;
                document.getElementById('info-diameter').innerText = obj.diameter;
                btnTrack.style.display = "block";

                btnTrack.innerText = isTracking ? "Dừng theo dõi" : "Theo dõi hành tinh này";
                planetSelect.value = obj.id;
            }

            document.getElementById('info-panel').classList.add('active');
        }

        function closeInfoPanel() {
            selectedPlanet = null;
            isTracking = false;
            planetSelect.value = "";
            controls.target.set(0, 0, 0);
            document.getElementById('info-panel').classList.remove('active');
        }

        planetSelect.addEventListener('change', (e) => {
            const selectedId = e.target.value;
            if (selectedId === "") {
                closeInfoPanel();
            } else if (selectedId === "sun") {
                showInfo(sunData);
                controls.target.set(0, 0, 0);
            } else {
                const planet = planetsData.find(p => p.id === selectedId);
                if (planet) {
                    isTracking = true;
                    showInfo(planet);
                }
            }
        });

        const btnPause = document.getElementById('btn-pause');
        btnPause.addEventListener('click', () => {
            isRunning = !isRunning;
            btnPause.innerText = isRunning ? "Tạm dừng" : "Tiếp tục";
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            closeInfoPanel();
            camera.position.set(0, 150, 280);
            controls.target.set(0, 0, 0);
        });

        const speedSlider = document.getElementById('speed-slider');
        const speedVal = document.getElementById('speed-val');
        speedSlider.addEventListener('input', () => {
            speedMultiplier = parseFloat(speedSlider.value);
            speedVal.innerText = speedMultiplier.toFixed(1);
        });

        document.getElementById('chk-orbits').addEventListener('change', (e) => {
            showOrbits = e.target.checked;
            orbitLines.forEach(line => line.visible = showOrbits);
        });

        document.getElementById('btn-track').addEventListener('click', () => {
            if (selectedPlanet && selectedPlanet.id !== "sun") {
                isTracking = !isTracking;
                document.getElementById('btn-track').innerText = isTracking ? "Dừng theo dõi" : "Theo dõi hành tinh này";
            }
        });

        document.getElementById('btn-close-info').addEventListener('click', closeInfoPanel);

        // --- THUẬT TOÁN CHIẾU TỌA ĐỘ ---
        const tempV = new THREE.Vector3();

        function updateLabelPosition(mesh, labelEl, offsetHeight) {
            tempV.setFromMatrixPosition(mesh.matrixWorld);
            tempV.y += offsetHeight; 
            
            tempV.project(camera);

            if (tempV.z > 1) {
                labelEl.style.display = 'none'; 
            } else {
                labelEl.style.display = 'block'; 
                const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;
                
                labelEl.style.left = `${x}px`;
                labelEl.style.top = `${y}px`;
            }
        }

        // --- VÒNG LẶP HOẠT ẢNH CHÍNH (Animation Loop) ---

        function animate() {
            requestAnimationFrame(animate);

            // Cập nhật nhãn Mặt Trời (giảm lệch đứng)
            updateLabelPosition(sunMesh, sunData.labelEl, sunData.radius + 2.0);

            // Cập nhật vị trí các hành tinh theo ĐỘNG LỰC HỌC KEPLER
            planetsData.forEach(planet => {
                if (isRunning) {
                    planet.meanAnomaly += planet.speed * speedMultiplier * 0.5;
                    planet.mesh.rotation.y += 0.01;
                }
                
                // Giải phương trình Kepler tìm E
                const E = solveKepler(planet.meanAnomaly, planet.eccentricity);

                // Tọa độ elip gốc
                const xLocal = planet.distance * Math.cos(E);
                const zLocal = planet.semiMinorAxis * Math.sin(E);

                // Chuyển dịch tâm về tiêu điểm Mặt Trời (0,0,0)
                planet.mesh.position.x = xLocal - planet.focusShift;
                planet.mesh.position.z = zLocal;

                // Cập nhật vị trí nhãn HTML cho hành tinh
                updateLabelPosition(planet.mesh, planet.labelEl, planet.radius + 1.8);

                // Cập nhật vị trí Mặt Trăng
                if (planet.moon) {
                    planet.moon.group.position.copy(planet.mesh.position);
                    
                    if (isRunning) {
                        planet.moon.angle += planet.moon.speed * speedMultiplier * 0.5;
                        planet.moon.mesh.rotation.y += 0.005;
                    }
                    planet.moon.mesh.position.x = Math.cos(planet.moon.angle) * planet.moon.distance;
                    planet.moon.mesh.position.z = Math.sin(planet.moon.angle) * planet.moon.distance;
                }
            });

            if (isRunning) sunMesh.rotation.y += 0.002;

            // Chế độ bám theo chuyển động (Tracking)
            if (isTracking && selectedPlanet && selectedPlanet.id !== "sun") {
                const targetPosition = new THREE.Vector3();
                selectedPlanet.mesh.getWorldPosition(targetPosition);
                controls.target.copy(targetPosition);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
